<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawara Studio - Link Bio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 50%, #2d2d00 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background particles */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .particle {
            position: absolute;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); }
            25% { transform: translateY(-100px) translateX(50px); }
            50% { transform: translateY(-200px) translateX(-50px); }
            75% { transform: translateY(-100px) translateX(100px); }
        }

        .container {
            max-width: 500px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .profile-card {
            background: rgba(26, 26, 26, 0.9);
            border-radius: 30px;
            padding: 40px 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5),
                        0 0 40px rgba(255, 215, 0, 0.1);
            border: 2px solid rgba(255, 215, 0, 0.2);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }

        .logo {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #ffd700;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);
            transition: transform 0.3s ease;
        }

        .logo:hover {
            transform: scale(1.05) rotate(5deg);
        }

        .profile-info {
            text-align: center;
            margin-bottom: 35px;
            animation: fadeInUp 0.8s ease-out;
        }

        .profile-name {
            font-size: 28px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 2px 2px 10px rgba(255, 215, 0, 0.3);
        }

        .profile-bio {
            font-size: 14px;
            color: #cccccc;
            line-height: 1.6;
            margin-bottom: 5px;
        }

        .links-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            animation: fadeInUp 1s ease-out;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 18px 25px;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 215, 0, 0.05) 100%);
            border: 2px solid rgba(255, 215, 0, 0.3);
            border-radius: 15px;
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .link-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .link-btn:hover::before {
            left: 100%;
        }

        .link-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 215, 0, 0.1) 100%);
        }

        .link-btn i {
            font-size: 20px;
            margin-right: 12px;
            min-width: 24px;
            text-align: center;
        }

        /* Specific button colors */
        .discord-btn:hover { 
            border-color: #5865F2;
            box-shadow: 0 10px 25px rgba(88, 101, 242, 0.3);
        }

        .tiktok-btn:hover { 
            border-color: #00f2ea;
            box-shadow: 0 10px 25px rgba(0, 242, 234, 0.3);
        }

        .instagram-btn:hover { 
            border-color: #E4405F;
            box-shadow: 0 10px 25px rgba(228, 64, 95, 0.3);
        }

        .youtube-btn:hover { 
            border-color: #FF0000;
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.3);
        }

        .whatsapp-btn:hover { 
            border-color: #25D366;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
        }

        .website-btn:hover { 
            border-color: #ffd700;
            box-shadow: 0 10px 25px rgba(255, 215, 0, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 215, 0, 0.2);
            animation: fadeIn 1.2s ease-out;
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .footer-link {
            color: #888;
            text-decoration: none;
            font-size: 12px;
            transition: color 0.3s ease;
        }

        .footer-link:hover {
            color: #ffd700;
        }

        .copyright {
            color: #666;
            font-size: 12px;
        }

        /* Animations */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .profile-card {
                padding: 30px 20px;
            }

            .profile-name {
                font-size: 24px;
            }

            .link-btn {
                padding: 15px 20px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation" id="bgAnimation"></div>

    <div class="container">
        <div class="profile-card">
            <!-- Logo -->
            <div class="logo-container">
                <img src="logo.png" alt="Kawara Studio Logo" class="logo" id="logoImg">
            </div>

            <!-- Profile Info -->
            <div class="profile-info">
                <h1 class="profile-name">kawarastudio.id</h1>
                <p class="profile-bio">Menyediakan menu Roblox</p>
                <p class="profile-bio">dan berbagai jasa digital.</p>
            </div>

            <!-- Social Links -->
            <div class="links-container">
                <a href="https://discord.gg/your-server" class="link-btn discord-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-discord"></i>
                    <span>Discord Server</span>
                </a>

                <a href="https://tiktok.com/@kawarastudio" class="link-btn tiktok-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-tiktok"></i>
                    <span>Order Fish4t</span>
                </a>

                <a href="https://instagram.com/kawarastudio" class="link-btn instagram-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>

                <a href="https://youtube.com/@kawarastudio" class="link-btn youtube-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-youtube"></i>
                    <span>YouTube</span>
                </a>

                <a href="https://chat.whatsapp.com/your-group-invite" class="link-btn whatsapp-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-whatsapp"></i>
                    <span>Support Donate</span>
                </a>

                <a href="https://kawarastudio.id" class="link-btn website-btn" target="_blank" rel="noopener noreferrer">
                    <i class="fas fa-globe"></i>
                    <span>Join kawarastore on Linktree</span>
                </a>
            </div>

            <!-- Footer -->
            <div class="footer">
                <div class="footer-links">
                    <a href="#" class="footer-link">Report</a>
                    <span style="color: #666;">•</span>
                    <a href="#" class="footer-link">Privacy</a>
                </div>
                <p class="copyright">© 2024 Kawara Studio. All rights reserved.</p>
            </div>
        </div>
    </div>

    <script>
        // Create floating particles
        function createParticles() {
            const bgAnimation = document.getElementById('bgAnimation');
            const particleCount = 15;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                const size = Math.random() * 100 + 50;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                
                bgAnimation.appendChild(particle);
            }
        }

        createParticles();

        // Logo error handling - use placeholder if image not found
        const logoImg = document.getElementById('logoImg');
        logoImg.onerror = function() {
            this.style.display = 'none';
            const logoContainer = this.parentElement;
            logoContainer.innerHTML = '<div style="width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%); display: flex; align-items: center; justify-content: center; font-size: 48px; font-weight: bold; color: #000; margin: 0 auto; border: 4px solid #ffd700; box-shadow: 0 10px 30px rgba(255, 215, 0, 0.3);">KS</div>';
        };
    </script>
</body>
</html>
