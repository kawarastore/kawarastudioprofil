<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kawara Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold: #f5c400;
            --gold-dim: rgba(245, 196, 0, 0.15);
            --gold-glow: rgba(245, 196, 0, 0.4);
            --white: #ffffff;
            --muted: rgba(255,255,255,0.5);
            --card-bg: rgba(10, 8, 0, 0.72);
            --border: rgba(245, 196, 0, 0.18);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 16px 60px;
            position: relative;
            overflow-x: hidden;
            background: #060400;
        }

        /* ── ANIMATED GRADIENT BG ── */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 80% 60% at 20% 10%, rgba(180, 120, 0, 0.35) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 80% 80%, rgba(100, 60, 0, 0.4) 0%, transparent 55%),
                radial-gradient(ellipse 50% 40% at 50% 50%, rgba(245, 196, 0, 0.08) 0%, transparent 70%),
                linear-gradient(160deg, #0e0900 0%, #1a1000 40%, #0a0700 70%, #050300 100%);
            animation: bgShift 12s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0%   { filter: hue-rotate(0deg) brightness(1); }
            50%  { filter: hue-rotate(8deg) brightness(1.08); }
            100% { filter: hue-rotate(-5deg) brightness(0.95); }
        }

        .bg::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(rgba(245,196,0,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(245,196,0,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            animation: orbFloat 18s ease-in-out infinite;
            z-index: 0;
            pointer-events: none;
        }
        .orb1 { width: 400px; height: 400px; background: #f5c400; top: -100px; left: -100px; animation-delay: 0s; }
        .orb2 { width: 300px; height: 300px; background: #ff8c00; bottom: 10%; right: -80px; animation-delay: -6s; }
        .orb3 { width: 250px; height: 250px; background: #ffd700; top: 40%; left: 30%; animation-delay: -12s; opacity: 0.12; }

        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            33%      { transform: translate(30px,-40px) scale(1.05); }
            66%      { transform: translate(-20px,30px) scale(0.95); }
        }

        /* ── CARD ── */
        .container {
            max-width: 460px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .card {
            background: var(--card-bg);
            border-radius: 28px;
            padding: 40px 28px 32px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(245,196,0,0.06),
                0 24px 60px rgba(0,0,0,0.6),
                inset 0 1px 0 rgba(255,255,255,0.05);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
        }

        /* ── PROFILE ── */
        .profile {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeDown 0.7s ease both;
        }

        .logo-wrap {
            position: relative;
            display: inline-block;
            margin-bottom: 18px;
        }

        .logo-ring {
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, #f5c400, #ff8c00, #ffd700, #f5c400);
            animation: spin 6s linear infinite;
            z-index: 0;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .logo-ring-mask {
            position: absolute;
            inset: 3px;
            border-radius: 50%;
            background: #0a0700;
            z-index: 1;
        }

        .logo {
            position: relative;
            z-index: 2;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }

        .logo:hover { transform: scale(1.06); }

        .profile-name {
            font-family: 'Rajdhani', sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--white);
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--gold-glow);
            margin-bottom: 8px;
        }

        .profile-bio {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.65;
        }

        /* ── SECTION ── */
        .section { margin-bottom: 24px; animation: fadeUp 0.7s ease both; }
        .section:nth-of-type(1) { animation-delay: 0.1s; }
        .section:nth-of-type(2) { animation-delay: 0.2s; }
        .section:nth-of-type(3) { animation-delay: 0.3s; }

        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .section-label span {
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.8;
            white-space: nowrap;
        }

        .section-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, var(--gold-dim), transparent);
        }

        /* ── BUTTONS ── */
        .links { display: flex; flex-direction: column; gap: 10px; }

        .btn {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 18px;
            border-radius: 14px;
            text-decoration: none;
            color: var(--white);
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.3px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            transition: all 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(245,196,0,0.08), transparent 60%);
            opacity: 0;
            transition: opacity 0.25s;
        }

        .btn:hover { transform: translateY(-3px) scale(1.01); }
        .btn:hover::after { opacity: 1; }
        .btn:active { transform: translateY(0) scale(0.99); }

        .btn-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 17px;
            flex-shrink: 0;
            color: #fff;
            transition: transform 0.25s ease;
        }

        .btn:hover .btn-icon { transform: scale(1.1) rotate(-5deg); }

        .btn-text { flex: 1; font-weight: 600; }

        .btn-arrow {
            color: var(--muted);
            font-size: 12px;
            transition: transform 0.25s, color 0.25s;
        }

        .btn:hover .btn-arrow { transform: translateX(3px); color: var(--gold); }

        /* Icon styles */
        .ic-tiktok    { background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.12); }
        .ic-instagram { background: linear-gradient(135deg, #405de6, #833ab4, #e1306c, #fd1d1d, #f56040); }
        .ic-youtube   { background: rgba(255,0,0,0.18); border: 1px solid rgba(255,0,0,0.25); color: #ff4444; }
        .ic-discord   { background: rgba(88,101,242,0.2); border: 1px solid rgba(88,101,242,0.3); color: #7289da; }
        .ic-whatsapp  { background: rgba(37,211,102,0.15); border: 1px solid rgba(37,211,102,0.25); color: #25d366; }
        .ic-store     { background: rgba(245,196,0,0.15); border: 1px solid rgba(245,196,0,0.25); color: #f5c400; }
        .ic-saweria   { background: rgba(255,107,53,0.15); border: 1px solid rgba(255,107,53,0.25); color: #ff6b35; }
        .ic-bagibagi  { background: rgba(100,200,255,0.12); border: 1px solid rgba(100,200,255,0.2); color: #64c8ff; }

        /* Hover borders */
        .btn-tiktok:hover    { border-color: rgba(255,255,255,0.25); box-shadow: 0 8px 24px rgba(0,0,0,0.35); }
        .btn-instagram:hover { border-color: rgba(225,48,108,0.35); box-shadow: 0 8px 24px rgba(225,48,108,0.18); }
        .btn-youtube:hover   { border-color: rgba(255,0,0,0.35); box-shadow: 0 8px 24px rgba(255,0,0,0.18); }
        .btn-discord:hover   { border-color: rgba(88,101,242,0.35); box-shadow: 0 8px 24px rgba(88,101,242,0.18); }
        .btn-whatsapp:hover  { border-color: rgba(37,211,102,0.35); box-shadow: 0 8px 24px rgba(37,211,102,0.18); }
        .btn-store:hover     { border-color: rgba(245,196,0,0.4); box-shadow: 0 8px 24px rgba(245,196,0,0.15); }
        .btn-saweria:hover   { border-color: rgba(255,107,53,0.35); box-shadow: 0 8px 24px rgba(255,107,53,0.18); }
        .btn-bagibagi:hover  { border-color: rgba(100,200,255,0.35); box-shadow: 0 8px 24px rgba(100,200,255,0.18); }

        /* ── FOOTER ── */
        .footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid rgba(245,196,0,0.1);
            animation: fadeUp 0.7s 0.4s ease both;
        }

        .footer p {
            font-size: 11px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1.5px;
            font-family: 'Rajdhani', sans-serif;
        }

        /* ── ANIMATIONS ── */
        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(-20px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 400px) {
            body { padding: 24px 12px 48px; }
            .card { padding: 28px 16px 24px; border-radius: 22px; }
            .logo { width: 110px; height: 110px; }
            .profile-name { font-size: 22px; letter-spacing: 2px; }
            .btn { padding: 12px 14px; gap: 11px; }
            .btn-icon { width: 32px; height: 32px; font-size: 15px; border-radius: 8px; }
            .btn-text { font-size: 13px; }
        }

        @media (min-width: 600px) {
            body { padding: 60px 24px 80px; }
            .container { max-width: 500px; }
            .card { padding: 48px 36px 36px; }
            .logo { width: 150px; height: 150px; }
            .profile-name { font-size: 30px; }
            .btn { padding: 16px 20px; gap: 16px; border-radius: 16px; }
            .btn-icon { width: 40px; height: 40px; font-size: 18px; }
            .btn-text { font-size: 15px; }
        }
    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>

    <div class="container">
        <div class="card">

            <!-- PROFILE -->
            <div class="profile">
                <div class="logo-wrap">
                    <div class="logo-ring"></div>

                </div>
                <h1 class="profile-name">Kawara Studio</h1>
                <p class="profile-bio">Menyediakan menu Roblox &amp; berbagai jasa digital.</p>
            </div>

            <!-- MEDIA SOSIAL -->
            <div class="section">
                <div class="section-label"><span>Media Sosial</span></div>
                <div class="links">

                    <a href="https://www.tiktok.com/@kawarastudio?lang=en" class="btn btn-tiktok" target="_blank" rel="noopener">
                        <div class="btn-icon ic-tiktok"><i class="fab fa-tiktok"></i></div>

                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </a>

                    <a href="https://www.instagram.com/kawarastudio.id/" class="btn btn-instagram" target="_blank" rel="noopener">
                        <div class="btn-icon ic-instagram"><i class="fab fa-instagram"></i></div>

                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </a>

                    <a href="https://www.youtube.com/@kawarastudio" class="btn btn-youtube" target="_blank" rel="noopener">
                        <div class="btn-icon ic-youtube"><i class="fab fa-youtube"></i></div>
                        <span class="btn-text">YouTube</span>
                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </a>

                </div>
            </div>

            <!-- KOMUNITAS -->
            <div class="section">
                <div class="section-label"><span>Komunitas</span></div>
                <div class="links">

                    <a href="https://discord.gg/QV257zScHe" class="btn btn-discord" target="_blank" rel="noopener">
                        <div class="btn-icon ic-discord"><i class="fab fa-discord"></i></div>
                        <span class="btn-text">Discord</span>
                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </a>

                    <a href="https://chat.whatsapp.com/FyZPVAJI0iN6Fd8MIJbn9q?mode=gi_t" class="btn btn-whatsapp" target="_blank" rel="noopener">
                        <div class="btn-icon ic-whatsapp"><i class="fab fa-whatsapp"></i></div>
                        <span class="btn-text">WhatsApp</span>
                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </a>

                    <a href="https://kawarastudio.store/" class="btn btn-store" target="_blank" rel="noopener">
                        <div class="btn-icon ic-store"><i class="fas fa-store"></i></div>
                        <span class="btn-text">Store</span>
                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </a>

                </div>
            </div>

            <!-- SUPPORT -->
            <div class="section">
                <div class="section-label"><span>Support</span></div>
                <div class="links">

                    <a href="https://saweria.co/KawaraStudio" class="btn btn-saweria" target="_blank" rel="noopener">
                        <div class="btn-icon ic-saweria"><i class="fas fa-hand-holding-heart"></i></div>
                        <span class="btn-text">Saweria</span>
                        <i class="fas fa-arrow-right btn-arrow"></i>

                    <a href="https://bagibagi.co/KawaraStudio" class="btn btn-bagibagi" target="_blank" rel="noopener">

                        <i class="fas fa-arrow-right btn-arrow"></i>
                    </a>

                </div>
            </div>

            <!-- FOOTER -->
            <div class="footer">
                <p>© 2025 KAWARA STUDIO · ALL RIGHTS RESERVED</p>
            </div>

        </div>
    </div>

    <script>
        document.getElementById('logoImg').onerror = function() {
            this.style.display = 'none';
            const wrap = this.parentElement;
            const fb = document.createElement('div');
            fb.style.cssText = 'position:relative;z-index:2;width:130px;height:130px;border-radius:50%;background:linear-gradient(135deg,#f5c400,#ff8c00);display:flex;align-items:center;justify-content:center;font-family:Rajdhani,sans-serif;font-size:42px;font-weight:700;color:#000;';
            fb.textContent = 'KS';
            wrap.appendChild(fb);
        };
    </script>
</body>
</html>
